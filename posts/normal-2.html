
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI트렌드: 라이프스타일: 공간 미학과 정리 정돈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream-bg: #FCFBF7;
      --charcoal-fg: #1E1B18;
      --gold-accent: #b8976f;
      --hairline-color: #e5e2db;
      --serif-font: 'Nanum Myeongjo', serif;
      --sans-font: 'Outfit', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--cream-bg);
      color: var(--charcoal-fg);
      font-family: var(--sans-font);
      line-height: 1.8;
      padding: 0 40px;
    }
    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 80px 0;
    }
    header {
      border-bottom: 1px solid var(--hairline-color);
      padding-bottom: 32px;
      margin-bottom: 60px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .brand {
      font-family: var(--serif-font);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--charcoal-fg);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    nav { display: flex; gap: 32px; }
    nav a {
      color: var(--charcoal-fg);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: color 0.3s ease;
    }
    nav a:hover { color: var(--gold-accent); }
    main { padding-bottom: 80px; }
    .kicker {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold-accent);
      margin-bottom: 24px;
    }
    h1 {
      font-family: var(--serif-font);
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.02em;
      color: var(--charcoal-fg);
      margin-bottom: 40px;
    }
    .story-body {
      font-family: var(--serif-font);
      font-size: 1.15rem;
      color: var(--charcoal-fg);
      font-weight: 400;
      text-align: justify;
      margin-bottom: 60px;
    }
    .story-body p { margin-bottom: 24px; text-indent: 12px; }
    .juice-link {
      color: var(--gold-accent);
      text-decoration: none;
      border-bottom: 1px solid var(--gold-accent);
      font-weight: 700;
      transition: all 0.3s ease;
    }
    .juice-link:hover {
      color: var(--charcoal-fg);
      border-bottom-color: var(--charcoal-fg);
    }
    .editorials {
      border-top: 1px solid var(--hairline-color);
      padding-top: 60px;
    }
    .editorial-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--gold-accent);
      margin-bottom: 40px;
    }
    .editorial-flow {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    .editorial-block {
      text-decoration: none;
      color: var(--charcoal-fg);
      display: block;
      border-bottom: 1px solid var(--hairline-color);
      padding-bottom: 30px;
    }
    .editorial-block:hover h3 { color: var(--gold-accent); }
    .editorial-block h3 {
      font-family: var(--serif-font);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
      transition: color 0.3s ease;
    }
    .editorial-block p {
      font-size: 0.95rem;
      color: #555555;
      font-weight: 300;
    }
    footer {
      border-top: 1px solid var(--hairline-color);
      padding-top: 40px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #888888;
    }
    footer a { color: #888888; text-decoration: none; }
    footer a:hover { color: var(--gold-accent); }
    @media(max-width: 768px) {
      header { flex-direction: column; gap: 16px; }
      h1 { font-size: 2rem; }
      .story-body { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <a href="/" class="brand">EDITORIAL.T3</a>
      <nav><a href="../index.html">HOME</a> | <a href="../sitemap.xml">SITEMAP</a></nav>
    </header>
    <main>
      <div class="kicker">BOUTIQUE T3 / ACCENT HAIRLINES</div>
      <h1>AI트렌드: 라이프스타일: 공간 미학과 정리 정돈</h1>
      <div class="story-body">
        가구 배치와 조명 연출 하나만으로 평범한 방을 아늑한 아지트로 변모시키는 공간 정리 팁은 내 멘탈 에너지를 가득 채워주는 보이지 않는 강력한 힘을 발휘하는 일상 속 예술입니다.
      </div>
      
      
    </main>
    <footer>
      <div>&copy; 2026 EDITORIAL.T3. ALL RIGHTS RESERVED.</div>
      <div>
        <a href="../sitemap.xml">SITEMAP</a> | 
        <a href="#">PRIVACY</a> | 
        <a href="#">DISCLAIMER</a>
      </div>
    </footer>
  </div>
</body>
</html>
